<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🔄 Return Voucher History</h2>
            <a href="/admin" class="btn btn-secondary">Back to Admin</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Date & Time</th>
                            <th>Challan Source</th>  <th class="text-center">Total Pipes</th>
                            <th>Pipe IDs</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for v in vouchers %}
                        <tr>
                            <td>#{{ v.id }}</td>
                            <td>{{ v.created_at[:16].replace('T', ' ') }}</td>
                            
                            <td style="font-weight: bold; color: #475569;">
                                {{ v.challan_source or 'N/A' }}
                            </td>
                            
                            <td class="text-center badge bg-danger" style="font-size: 1rem;">
                                {{ v.total_pipes }}
                            </td>
                            <td style="word-break: break-all; max-width: 300px; font-size: 0.85rem; color: #64748b;">
                                {{ v.pipe_ids_json }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
